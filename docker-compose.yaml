services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mata-challenge-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: mata-challenge-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: qwerty
      MYSQL_DATABASE: challenge-db
    ports:
      - "3306:3306"
    volumes:
      - db_challenge_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pqwerty"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mata-challenge-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: "qwerty"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_challenge_data: